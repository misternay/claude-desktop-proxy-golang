name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="claude-code-proxy-${{ matrix.suffix }}"
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "${BINARY_NAME}" ./cmd/server
          # Bundle the config template alongside the binary so users have a ready-to-edit example.
          cp config.example.yaml "${BINARY_NAME}.config.example.yaml"
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: |
            ${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}.config.example.yaml

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List binaries
        run: ls -lh claude-code-proxy-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-code-proxy-*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 📦 Binaries

            Each archive also includes `*.config.example.yaml` — a ready-to-edit config template.

            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | Linux | x86_64 | `claude-code-proxy-linux-amd64` |
            | Linux | ARM64 | `claude-code-proxy-linux-arm64` |
            | macOS | Intel | `claude-code-proxy-darwin-amd64` |
            | macOS | Apple Silicon | `claude-code-proxy-darwin-arm64` |
            | Windows | x86_64 | `claude-code-proxy-windows-amd64.exe` |

            ## ⚠️ Breaking change in this release

            Configuration has moved from **environment variables** to a single **`config.yaml`** file.
            `OPENAI_API_KEY`, `BIG_MODEL`, etc. are no longer read from the environment.
            See the migration step below.

            ## 🚀 Quick Start

            **1. Download the binary for your platform** (see table above).

            **2. Make it executable** (Linux/macOS only):
            ```bash
            chmod +x claude-code-proxy-*
            ```

            **3. Create a config file** from the bundled template:
            ```bash
            cp claude-code-proxy-*.config.example.yaml config.yaml
            ```
            Edit `config.yaml` and set at minimum:
            ```yaml
            openai_api_key: sk-...
            ```

            **4. Run the proxy:**
            ```bash
            ./claude-code-proxy-linux-amd64
            # or the appropriate binary for your platform
            ```

            The server starts on `http://0.0.0.0:8082` by default.

            ## ⚙️ Configuration

            The proxy searches for `config.yaml` in this order:
            1. Path given to `--config`
            2. `./config.yaml`
            3. `~/.claude-code-proxy/config.yaml`
            4. `/etc/claude-code-proxy/config.yaml`

            See `config.example.yaml` (bundled with the binary, also in the repo) for the full
            annotated schema: secrets, upstream URL, server, token limits, connection settings,
            three-tier model routing, and custom upstream headers.

            ## 🔗 Point Claude Code at the Proxy

            Set the Anthropic base URL in your Claude Code config:
            ```bash
            export ANTHROPIC_BASE_URL="http://localhost:8082"
            ```

            ## 🐳 Docker

            Mount your `config.yaml` at the default discovery path:
            ```bash
            docker run -p 8082:8082 \
              -v ./config.yaml:/etc/claude-code-proxy/config.yaml:ro \
              ghcr.io/misternay/claude-desktop-proxy-golang:${{ github.ref_name }}
            ```

            ---
            See the [README](https://github.com/misternay/claude-desktop-proxy-golang) for full documentation.
